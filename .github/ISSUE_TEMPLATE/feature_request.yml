name: 💡 Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest something. The best feature requests describe the problem, not the solution — that gives us room to find the right fix.

        **Before filing**, scan the [ROADMAP](https://github.com/Basilisk-Inc/spinalis-releases/blob/main/ROADMAP.md). If your idea is already planned, give the existing roadmap item a 👍 instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, the friction, and what you're trying to accomplish. Don't jump straight to the proposed solution.
      placeholder: |
        I'm fine-tuning models for our internal support team and need to evaluate quality across multiple correction batches over time. Right now I have to compare metrics by hand across builds.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: What would you like to see?
      description: A concrete suggestion is fine — just don't be wedded to it. We may suggest a different shape that better fits the platform.
      placeholder: |
        A "compare builds" view that shows eval loss / perplexity / a sample of generations side-by-side for two or more builds in the same project.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What have you tried?
      description: Workarounds, other tools, manual processes. Helps us understand whether the gap is real or just unsurfaced.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Nice to have — wouldn't change my usage"
        - "Would meaningfully improve my workflow"
        - "Blocking — can't use Spinalis without it"
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: License tier you use
      description: Helps us prioritize — paid customers get weight on prioritization.
      options:
        - "Community (free)"
        - "Pro"
        - "Enterprise"
        - "Evaluating / not yet decided"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Domain, scale, related links, sketches.

  - type: checkboxes
    id: search-checked
    attributes:
      label: Confirmation
      options:
        - label: I searched [existing issues](https://github.com/Basilisk-Inc/spinalis-releases/issues?q=is%3Aissue) and the [roadmap](https://github.com/Basilisk-Inc/spinalis-releases/blob/main/ROADMAP.md) and this isn't already there.
          required: true